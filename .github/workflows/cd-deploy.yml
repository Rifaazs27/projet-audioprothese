name: CD — Build & Deploy

# Déclenché manuellement ou sur un tag de version, afin de ne pas tenter de
# déployer tant que les secrets Azure ne sont pas configurés (voir docs/cicd.md).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC vers Azure (pas de secret de mot de passe stocké)

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push-scan:
    name: Build, scan & push des images
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Connexion Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Connexion au registre ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: app/backend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/audioprothese-backend:${{ env.IMAGE_TAG }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/audioprothese-frontend:${{ env.IMAGE_TAG }}

      - name: Scan de l'image backend (Trivy, bloquant si CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/audioprothese-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Déploiement Helm sur AKS
    needs: build-push-scan
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Connexion Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Récupérer les credentials AKS
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - uses: azure/setup-helm@v4

      - name: Déploiement Helm
        run: |
          helm upgrade --install audioprothese k8s/helm/audioprothese \
            --namespace audioprothese --create-namespace \
            --set image.registry=${{ secrets.ACR_LOGIN_SERVER }} \
            --set image.tag=${{ needs.build-push-scan.outputs.tag }} \
            --set ingress.host=${{ secrets.APP_HOSTNAME }} \
            --wait --timeout 5m
