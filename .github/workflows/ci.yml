name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/requirements-dev.txt
      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest

  frontend:
    name: Frontend — build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm install
      - name: Tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build

  helm-lint:
    name: Helm — lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint k8s/helm/audioprothese
      - name: Rendu des manifests
        run: helm template audioprothese k8s/helm/audioprothese --set image.registry=acr.example.io

  terraform-validate:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
