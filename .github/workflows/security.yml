name: DevSecOps

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # scan hebdomadaire (lundi 6h UTC)

permissions:
  contents: read
  security-events: write # upload SARIF vers l'onglet Security

jobs:
  trivy-fs:
    name: Trivy — dépendances & IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan du système de fichiers (vulns + secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig
      - name: Publier le rapport SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  codeql:
    name: CodeQL — analyse statique
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  gitleaks:
    name: Gitleaks — fuite de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
