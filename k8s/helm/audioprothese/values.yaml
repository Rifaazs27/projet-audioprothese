# Valeurs par défaut. Surchargées par la CI (tag d'image, registre ACR, hôte).
namespace: audioprothese

image:
  registry: ""          # ex : acraudioprothesexxxxx.azurecr.io
  backendRepository: audioprothese-backend
  frontendRepository: audioprothese-frontend
  tag: latest
  pullPolicy: IfNotPresent

backend:
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # La chaîne de connexion provient d'un Secret Kubernetes (issu de Key Vault).
  databaseUrlSecretName: audioprothese-db
  databaseUrlSecretKey: database-url

frontend:
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

ingress:
  enabled: true
  className: nginx
  host: audioprothese.local
  tls:
    enabled: true
    # cert-manager émet le certificat via Let's Encrypt.
    clusterIssuer: letsencrypt-prod

# Autoscaling horizontal du backend (résilience + maîtrise des coûts).
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# Active la collecte des métriques par kube-prometheus-stack.
serviceMonitor:
  enabled: true
