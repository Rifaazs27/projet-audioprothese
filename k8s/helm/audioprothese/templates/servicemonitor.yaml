{{- if .Values.serviceMonitor.enabled }}
# ServiceMonitor consommé par kube-prometheus-stack pour scraper /metrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "audioprothese.labels" . | nindent 4 }}
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
{{- end }}
