{{- if .Values.image.registry }}
# Synchronise le secret "database-url" d'Azure Key Vault vers un Secret
# Kubernetes via le CSI Secrets Store driver + Workload Identity.
# (Désactivé en local/CI où image.registry est vide.)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: audioprothese-kv
  namespace: {{ .Values.namespace }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.backend.databaseUrlSecretName }}
      type: Opaque
      data:
        - objectName: database-url
          key: {{ .Values.backend.databaseUrlSecretKey }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: "REMPLACER_PAR_OUTPUT_TERRAFORM_key_vault_name"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
    tenantId: "REMPLACER_PAR_TENANT_ID"
{{- end }}
