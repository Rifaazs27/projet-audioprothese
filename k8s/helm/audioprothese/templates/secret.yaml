{{- if .Values.databaseUrl }}
# Secret contenant la chaîne de connexion à la base, fournie par la CI
# (terraform output -> --set-string databaseUrl=...). Aucun secret n'est
# stocké dans le dépôt Git.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.databaseUrlSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "audioprothese.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.backend.databaseUrlSecretKey }}: {{ .Values.databaseUrl | quote }}
{{- end }}
