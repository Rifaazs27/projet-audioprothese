server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes non-fichiers renvoient index.html.
    # Le routage de /api vers le backend est assuré par l'Ingress Kubernetes
    # (voir k8s/helm/audioprothese/templates/ingress.yaml), pas par nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés produits par Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sonde de santé pour Kubernetes.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
