global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Envoi des alertes à Alertmanager (qui les route vers Slack/Teams).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Backend FastAPI : expose /metrics (compteurs et latences HTTP).
  - job_name: audioprothese-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
