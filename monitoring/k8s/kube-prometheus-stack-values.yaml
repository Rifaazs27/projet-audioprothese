# Valeurs Helm pour kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
# dimensionnées pour un cluster MVP mono-nœud (FinOps).
#
# Installation :
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f monitoring/k8s/kube-prometheus-stack-values.yaml

prometheus:
  prometheusSpec:
    retention: 3d                # rétention courte pour limiter le stockage
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    # Découvre automatiquement tous les ServiceMonitor du cluster.
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  adminPassword: "changeme-en-demo"   # à surcharger via --set en production
  defaultDashboardsEnabled: true
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 256Mi }
  # Datasource Loki ajoutée en complément des dashboards par défaut.
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits:   { cpu: 100m, memory: 128Mi }
  # Routage des alertes vers Slack/Teams. Remplacer l'URL du webhook au
  # déploiement :  --set alertmanager.config.global.slack_api_url=$SLACK_WEBHOOK_URL
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "https://hooks.slack.com/services/REMPLACER/MOI"
    route:
      receiver: equipe-slack
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
      - name: equipe-slack
        slack_configs:
          - channel: "#alertes-audioprothese"
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}* {{ .Annotations.description }}
              {{ end }}
    # Microsoft Teams : ajouter un receiver webhook_configs pointant vers un
    # relais prometheus-msteams (cf. monitoring/alertmanager/alertmanager.yml).

# Allègements pour un cluster mono-nœud Student.
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
defaultRules:
  create: true
