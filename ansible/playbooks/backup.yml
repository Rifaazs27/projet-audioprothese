---
# Sauvegarde chiffrée de PostgreSQL vers MinIO (on-prem).
# Le dump est réalisé via un conteneur postgres:16 (évite les soucis de
# version du client) puis poussé dans le bucket MinIO chiffré.
# Variables attendues : database_dsn, minio_root_user, minio_root_password.
- name: Sauvegarde PostgreSQL -> MinIO
  hosts: onprem
  become: true
  vars:
    minio_bucket: audioprothese-backups
    backup_name: "audioprothese-{{ ansible_date_time.iso8601_basic_short }}.sql.gz"
  tasks:
    - name: Dump de la base via conteneur postgres:16
      ansible.builtin.shell: |
        set -o pipefail
        docker run --rm postgres:16-alpine \
          pg_dump "{{ database_dsn }}" | gzip > /tmp/{{ backup_name }}
      args:
        executable: /bin/bash
      changed_when: true

    - name: Configurer l'alias mc local
      ansible.builtin.command: >
        mc alias set local http://127.0.0.1:9000
        "{{ minio_root_user }}" "{{ minio_root_password }}"
      changed_when: false

    - name: Pousser la sauvegarde dans MinIO (chiffrée par SSE-S3)
      ansible.builtin.command: "mc cp /tmp/{{ backup_name }} local/{{ minio_bucket }}/"
      changed_when: true

    - name: Purger les sauvegardes locales temporaires
      ansible.builtin.file:
        path: "/tmp/{{ backup_name }}"
        state: absent

    - name: Lister les sauvegardes présentes dans MinIO
      ansible.builtin.command: "mc ls local/{{ minio_bucket }}/"
      register: backups
      changed_when: false

    - name: Afficher l'inventaire des sauvegardes
      ansible.builtin.debug:
        var: backups.stdout_lines
